spring.application.name=Second
# SERVER
server.port=8080


# DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/secondDB
spring.datasource.username=
%spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# JWT
# IMPORTANT: Replace with a 64+ character random secret in production
app.jwt.secret=REPLACE_WITH_A_VERY_LONG_RANDOM_SECRET_KEY_AT_LEAST_64_CHARACTERS_LONG
app.jwt.expiration-ms=86400000

# OAUTH2 - GOOGLE
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=email,profile

# OAUTH2 - GITHUB
# Get credentials from: https://github.com/settings/developers
# Authorized callback URL: http://localhost:8080/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-id=YOUR_GITHUB_CLIENT_ID
spring.security.oauth2.client.registration.github.client-secret=YOUR_GITHUB_CLIENT_SECRET
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# OAUTH2 - FACEBOOK
# Get credentials from: https://developers.facebook.com/
# Valid OAuth Redirect URI: http://localhost:8080/login/oauth2/code/facebook
spring.security.oauth2.client.registration.facebook.client-id=YOUR_FACEBOOK_CLIENT_ID
spring.security.oauth2.client.registration.facebook.client-secret=YOUR_FACEBOOK_CLIENT_SECRET
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,email,picture